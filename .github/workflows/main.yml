name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8

jobs:
  validate:
    name: Validate Python Sources
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            VoiceCommand/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r VoiceCommand/requirements.txt

      - name: Compile core modules
        working-directory: VoiceCommand
        shell: pwsh
        run: |
          $files = @(
            "Main.py",
            "VoiceCommand.py",
            "ai_assistant.py",
            "audio_manager.py",
            "character_widget.py",
            "config_manager.py",
            "constants.py",
            "threads.py",
            "weather_service.py",
            "timer_manager.py",
            "llm_provider.py",
            "agent_planner.py",
            "agent_orchestrator.py",
            "autonomous_executor.py",
            "automation_helpers.py",
            "web_tools.py",
            "agent/llm_provider.py",
            "agent/agent_planner.py",
            "agent/agent_orchestrator.py",
            "agent/autonomous_executor.py",
            "agent/automation_helpers.py",
            "agent/real_verifier.py",
            "services/web_tools.py",
            "ui/text_interface.py",
            "ui/tray_icon.py",
            "ui/settings_dialog.py",
            "ui/speech_bubble.py",
            "tts/tts_factory.py",
            "tts/tts_openai.py",
            "tts/tts_edge.py",
            "tts/tts_elevenlabs.py",
            "tts/cosyvoice_tts.py",
            "tts/fish_tts_ws.py",
            "memory/memory_manager.py",
            "memory/user_context.py",
            "memory/conversation_history.py",
            "assistant/ai_assistant.py",
            "assistant/groq_assistant.py",
            "audio/audio_manager.py",
            "audio/simple_wake.py",
            "core/VoiceCommand.py",
            "core/config_manager.py",
            "core/constants.py",
            "core/core_manager.py",
            "core/resource_manager.py",
            "core/rp_generator.py",
            "core/threads.py",
            "services/weather_service.py",
            "services/timer_manager.py",
            "ui/character_widget.py",
            "tts/cosyvoice_worker.py",
            "text_interface.py",
            "commands/ai_command.py",
            "build_exe.py"
          )
          python -m py_compile $files

      - name: Smoke-test template routing
        working-directory: VoiceCommand
        shell: pwsh
        run: |
          @'
          from agent_planner import AgentPlanner
          from llm_provider import LLMProvider

          planner = AgentPlanner(LLMProvider(api_key=""))
          samples = [
              "바탕화면에 샘플 폴더 만들어줘",
              "시스템 정보 수집해서 md로 저장해줘",
              r"C:\Users\runneradmin\Desktop 폴더 목록 저장해줘",
              "https://example.com 열어줘",
          ]

          for sample in samples:
              steps = planner._build_template_plan(sample)
              if not steps:
                  raise SystemExit(f"Template plan missing: {sample}")
          print("template routing ok")
          '@ | python -
