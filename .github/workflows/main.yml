name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8

jobs:
  validate:
    name: Validate Python Sources
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            VoiceCommand/requirements.txt

      - name: Install dependencies
        run: |
          py -3.11 -m pip install --upgrade pip
          py -3.11 -m pip install -r VoiceCommand/requirements.txt
          py -3.11 -m pip install bandit

      - name: Validate repository
        working-directory: VoiceCommand
        run: py -3.11 validate_repo.py

      - name: Run unit tests
        working-directory: VoiceCommand
        run: py -3.11 -m unittest discover -s tests -p "test_*.py" -v
        continue-on-error: true

      - name: Security scan (bandit)
        working-directory: VoiceCommand
        run: |
          py -3.11 -m bandit -r . -x tests,__pycache__ --severity-level medium --confidence-level medium -q
        continue-on-error: true
