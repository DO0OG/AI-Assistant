name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8

jobs:
  build:
    name: Build Ari EXE
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            VoiceCommand/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r VoiceCommand/requirements.txt
          pip install nuitka

      - name: Validate repository
        working-directory: VoiceCommand
        run: python validate_repo.py

      - name: Build EXE (Standalone Folder)
        working-directory: VoiceCommand
        run: python build_exe.py --clean

      - name: Zip Artifact
        working-directory: VoiceCommand
        shell: pwsh
        run: |
          $preferred = Join-Path $PWD "dist\Ari"
          $fallback = Join-Path $PWD "dist\Main.dist"
          $sourceDir = $null

          if (Test-Path $preferred) {
            $sourceDir = $preferred
          }
          elseif (Test-Path $fallback) {
            $sourceDir = $fallback
          }
          else {
            Write-Host "dist 디렉터리 내용:"
            Get-ChildItem -Path (Join-Path $PWD "dist") -Recurse -Force -ErrorAction SilentlyContinue
            throw "압축할 빌드 산출물 폴더를 찾지 못했습니다."
          }

          $zipPath = Join-Path (Split-Path $PWD -Parent) "Ari-windows.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path $sourceDir -DestinationPath $zipPath -Force

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ari-windows-binary
          path: Ari-windows.zip
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: Ari-windows-binary

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Ari-windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
