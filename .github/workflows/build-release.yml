name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8

jobs:
  build:
    name: Build Ari EXE
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            VoiceCommand/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r VoiceCommand/requirements.txt
          pip install nuitka

      - name: Validate build inputs
        working-directory: VoiceCommand
        shell: pwsh
        run: |
          python -m py_compile Main.py build_exe.py VoiceCommand.py ai_assistant.py audio_manager.py character_widget.py config_manager.py constants.py threads.py weather_service.py timer_manager.py llm_provider.py agent_planner.py autonomous_executor.py automation_helpers.py text_interface.py tray_icon.py settings_dialog.py speech_bubble.py tts_factory.py tts_openai.py tts_edge.py tts_elevenlabs.py cosyvoice_tts.py fish_tts_ws.py cosyvoice_worker.py memory_manager.py user_context.py conversation_history.py agent/llm_provider.py agent/agent_planner.py agent/autonomous_executor.py agent/automation_helpers.py agent/real_verifier.py assistant/ai_assistant.py assistant/groq_assistant.py audio/audio_manager.py audio/simple_wake.py core/VoiceCommand.py core/config_manager.py core/constants.py core/core_manager.py core/resource_manager.py core/rp_generator.py core/threads.py services/web_tools.py services/weather_service.py services/timer_manager.py ui/text_interface.py ui/tray_icon.py ui/settings_dialog.py ui/speech_bubble.py ui/character_widget.py tts/tts_factory.py tts/tts_openai.py tts/tts_edge.py tts/tts_elevenlabs.py tts/cosyvoice_tts.py tts/fish_tts_ws.py tts/cosyvoice_worker.py memory/memory_manager.py memory/user_context.py memory/conversation_history.py

      - name: Build EXE (Standalone Folder)
        working-directory: VoiceCommand
        run: python build_exe.py --clean

      - name: Zip Artifact
        working-directory: VoiceCommand
        shell: pwsh
        run: |
          $preferred = Join-Path $PWD "dist\Ari"
          $fallback = Join-Path $PWD "dist\Main.dist"
          $sourceDir = $null

          if (Test-Path $preferred) {
            $sourceDir = $preferred
          }
          elseif (Test-Path $fallback) {
            $sourceDir = $fallback
          }
          else {
            Write-Host "dist 디렉터리 내용:"
            Get-ChildItem -Path (Join-Path $PWD "dist") -Recurse -Force -ErrorAction SilentlyContinue
            throw "압축할 빌드 산출물 폴더를 찾지 못했습니다."
          }

          $zipPath = Join-Path (Split-Path $PWD -Parent) "Ari-windows.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path $sourceDir -DestinationPath $zipPath -Force

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ari-windows-binary
          path: Ari-windows.zip
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: Ari-windows-binary

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Ari-windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
