name: Plugin Validation Pipeline

on:
  workflow_dispatch:
    inputs:
      plugin_id:
        required: true
        description: "Supabase plugins 테이블의 UUID"
      developer_id:
        required: true
        description: "Supabase auth.users의 UUID"

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PLUGIN_ID: ${{ inputs.plugin_id }}
      DEVELOPER_ID: ${{ inputs.developer_id }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          pip install supabase requests bandit pylint semgrep
          sudo apt-get update -qq
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam --quiet

      - name: 플러그인 다운로드
        run: python market/marketplace/scripts/download_plugin.py

      # STEP 1: 바이러스 스캔
      - name: ClamAV 바이러스 스캔
        run: |
          clamscan -r ./plugin/ --infected --no-summary \
            --log=clamav_result.txt || true
          python market/marketplace/scripts/check_clamav.py

      # STEP 2: 정적 분석
      - name: Bandit 보안 분석
        run: |
          bandit -r ./plugin/ -f json -o bandit_result.json \
            --severity-level medium || true

      - name: Pylint 코드 품질
        run: |
          pylint ./plugin/ --output-format=json \
            --disable=C,R > pylint_result.json || true

      - name: 정적 분석 판정
        run: python market/marketplace/scripts/check_static.py

      # STEP 3: semgrep 보안 스캔 (무료 OSS)
      - name: semgrep 보안 스캔
        run: python market/marketplace/scripts/semgrep_review.py

      # 최종 판정 (항상 실행)
      - name: 결과 집계 & DB 반영
        if: always()
        run: python market/marketplace/scripts/finalize.py
