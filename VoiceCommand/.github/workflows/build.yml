name: Build Ari EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_PROGRESS_BAR: "off"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONHASHSEED: "0"
      PYTHONUNBUFFERED: "1"
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        run: |
          py -3.11 -m pip install --upgrade pip
          py -3.11 -m pip install -r requirements.txt

      - name: Install Nuitka
        run: py -3.11 -m pip install nuitka

      - name: Validate repository
        run: py -3.11 validate_repo.py

      - name: Build EXE (clean)
        run: py -3.11 build_exe.py --clean

      - name: Zip artifact
        shell: pwsh
        run: |
          $preferred = Join-Path $PWD "dist\Ari"
          $fallback = Join-Path $PWD "dist\Main.dist"
          $sourceDir = $null

          if (Test-Path $preferred) {
            $sourceDir = $preferred
          }
          elseif (Test-Path $fallback) {
            $sourceDir = $fallback
          }
          else {
            Get-ChildItem -Path (Join-Path $PWD "dist") -Recurse -Force -ErrorAction SilentlyContinue
            throw "압축할 빌드 산출물 폴더를 찾지 못했습니다."
          }

          $zipPath = Join-Path $PWD "Ari-windows.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path $sourceDir -DestinationPath $zipPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: Ari-windows
          path: Ari-windows.zip
          retention-days: 30
